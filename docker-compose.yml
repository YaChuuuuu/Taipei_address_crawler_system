services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      TZ: Asia/Taipei
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      TZ: Asia/Taipei
    volumes:
      - ./data/loki:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: 試題2/Dockerfile
    ports:
      - "8000:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
      DATA_PATH: /app/data/
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      LOKI_URL: http://loki:3100
      CRAWLER_URL: http://crawler:8001
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      NOTIFY_COOLDOWN: ${NOTIFY_COOLDOWN:-300}
      TZ: Asia/Taipei
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
      crawler:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: 試題2/Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      TZ: Asia/Taipei
    depends_on:
      - api
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: 試題1/Dockerfile
    environment:
      RUNNING_IN_DOCKER: "true"
      DATA_PATH: /app/data/
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      LOKI_URL: http://loki:3100
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      NOTIFY_COOLDOWN: ${NOTIFY_COOLDOWN:-300}
      TARGET_URL: ${TARGET_URL:-https://www.ris.gov.tw/app/portal/3053}
      DATE_START: ${DATE_START:-114-09-01}
      DATE_END: ${DATE_END:-114-11-30}
      QUERY_TYPE: ${QUERY_TYPE:-門牌初編}
      MAX_RETRY: ${MAX_RETRY:-10}
      TZ: Asia/Taipei
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
